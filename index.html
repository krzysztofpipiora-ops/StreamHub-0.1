<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .liquid-glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .liquid-glass-active {
            background: rgba(147, 51, 234, 0.2);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(147, 51, 234, 0.4);
        }
    </style>
</head>
<body class="bg-[#040108] text-slate-100 min-h-screen font-sans relative overflow-x-hidden">

    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="absolute top-[-20%] left-[-20%] w-[90vw] h-[90vw] rounded-full bg-purple-900/10 blur-[140px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[70vw] h-[70vw] rounded-full bg-pink-900/10 blur-[120px]"></div>
    </div>

    <div id="toast" class="fixed top-4 right-4 z-50 transform translate-y-[-20px] opacity-0 pointer-events-none transition-all duration-300 p-3 rounded-xl bg-purple-600 text-white font-bold text-xs shadow-xl flex items-center gap-2">
        <i data-lucide="check-circle" class="w-4 h-4"></i>
        <span id="toast-text">Powiadomienie</span>
    </div>

    <div id="screen-login" class="hidden min-h-screen flex items-center justify-center p-4 relative z-30">
        <div class="w-full max-w-md p-8 rounded-3xl liquid-glass text-center space-y-6 shadow-2xl">
            <div class="inline-flex p-4 rounded-2xl bg-gradient-to-tr from-purple-600 to-pink-600 shadow-lg">
                <i data-lucide="radio" class="w-8 h-8 text-white"></i>
            </div>
            <div>
                <h1 class="text-2xl font-black bg-gradient-to-r from-white to-purple-400 bg-clip-text text-transparent">StreamHub Pro</h1>
                <p class="text-xs text-slate-400 mt-1">Zaloguj się swoim kontem Google, aby zarządzać swoim profilem.</p>
            </div>

            <button id="btn-google-login" class="w-full flex items-center justify-center gap-3 p-4 rounded-2xl bg-white/5 hover:bg-white/10 border border-white/10 transition-all font-semibold text-sm cursor-pointer">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#EA4335" d="M12 5.04c1.7 0 3.2.6 4.4 1.7l3.3-3.3C17.7 1.6 15 1 12 1 7.3 1 3.4 3.7 1.6 7.6l3.9 3c1-2.9 3.7-5.5 6.5-5.5z"/><path fill="#4285F4" d="M23.5 12.3c0-.8-.1-1.6-.2-2.3H12v4.4h6.5c-.3 1.5-1.1 2.8-2.4 3.7l3.7 2.9c2.2-2 3.7-5 3.7-8.7z"/><path fill="#FBBC05" d="M5.5 14.5c-.2-.6-.4-1.3-.4-2s.2-1.4.4-2L1.6 7.6C.6 9.5 0 11.7 0 14s.6 4.5 1.6 6.4l3.9-2.9z"/><path fill="#34A853" d="M12 23c3.2 0 6-1.1 8-3l-3.7-2.9c-1.1.7-2.5 1.2-4.3 1.2-2.8 0-5.5-2.6-6.5-5.5l-3.9 3C3.4 20.3 7.3 23 12 23z"/></svg>
                <span>Kontynuuj przez Google</span>
            </button>
        </div>
    </div>

    <div id="screen-dashboard" class="hidden min-h-screen flex flex-col md:flex-row relative z-20">
        
        <aside class="w-full md:w-64 liquid-glass md:border-r border-b border-white/5 p-4 flex flex-row md:flex-col justify-between items-center md:items-stretch gap-4 shrink-0">
            <div class="flex md:flex-col items-center md:items-stretch justify-between w-full md:justify-start gap-5">
                <div class="flex items-center gap-2">
                    <div class="p-2 rounded-xl bg-purple-600 shadow-lg"><i data-lucide="radio" class="w-4 h-4 text-white"></i></div>
                    <span class="font-black text-sm tracking-wider uppercase hidden sm:inline">StreamHub</span>
                </div>

                <div class="flex items-center gap-2 md:p-2.5 md:rounded-xl md:bg-white/5 border border-white/5">
                    <img id="ui-avatar" src="" class="w-7 h-7 rounded-full bg-purple-900/40 border border-purple-400">
                    <div class="hidden md:block truncate max-w-[120px]">
                        <p id="ui-username" class="text-xs font-black">Ładowanie...</p>
                        <p class="text-[9px] text-purple-400 font-bold uppercase tracking-widest">Konto aktywne</p>
                    </div>
                </div>

                <nav class="flex md:flex-col gap-1">
                    <button onclick="switchTab('tab-home')" id="nav-tab-home" class="nav-btn flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-bold transition-all">
                        <i data-lucide="layout-dashboard" class="w-3.5 h-3.5"></i> <span class="hidden md:inline">Panel główny</span>
                    </button>
                    <button onclick="switchTab('tab-schedule')" id="nav-tab-schedule" class="nav-btn flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-bold transition-all">
                        <i data-lucide="calendar" class="w-3.5 h-3.5"></i> <span class="hidden md:inline">Harmonogram</span>
                    </button>
                    <button onclick="switchTab('tab-bot')" id="nav-tab-bot" class="nav-btn flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-bold transition-all">
                        <i data-lucide="bot" class="w-3.5 h-3.5"></i> <span class="hidden md:inline">Asystent AI</span>
                    </button>
                </nav>
            </div>

            <button id="btn-logout" class="px-3 py-2 bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 rounded-xl text-xs font-bold transition-all cursor-pointer">
                Wyloguj się
            </button>
        </aside>

        <main class="flex-1 p-4 md:p-6 space-y-4 overflow-y-auto max-w-4xl mx-auto w-full">
            
            <div id="tab-home" class="tab-view hidden space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div class="p-4 rounded-2xl liquid-glass">
                        <span class="text-[9px] font-bold text-slate-400 block uppercase tracking-widest">Twoje zaplanowane transmisje</span>
                        <h3 id="stat-count" class="text-2xl font-black mt-1 text-purple-400">0</h3>
                    </div>
                    <div class="p-4 rounded-2xl liquid-glass">
                        <span class="text-[9px] font-bold text-slate-400 block uppercase tracking-widest">Baza danych</span>
                        <h3 class="text-xs font-bold text-emerald-400 flex items-center gap-1.5 mt-2">
                            <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> CHMURA POŁĄCZONA
                        </h3>
                    </div>
                </div>

                <div class="p-5 rounded-2xl liquid-glass space-y-3">
                    <div class="flex items-center gap-2 text-slate-300">
                        <i data-lucide="text-cursor-input" class="w-4 h-4 text-purple-400"></i>
                        <h3 class="text-xs font-bold uppercase tracking-wider">Mój aktualny tytuł streamu</h3>
                    </div>
                    <input id="inp-stream-title" type="text" placeholder="Wpisz swój tytuł..." class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-xs focus:outline-none focus:border-purple-500 text-slate-100 transition-all">
                    <button id="btn-save-title" class="w-full py-3 bg-purple-600 hover:bg-purple-700 text-white text-xs font-bold rounded-xl transition-all cursor-pointer">
                        Zapisz zmiany w bazie danych
                    </button>
                </div>
            </div>

            <div id="tab-schedule" class="tab-view hidden space-y-4">
                <div class="p-5 rounded-2xl liquid-glass space-y-4">
                    <div class="flex items-center gap-2">
                        <i data-lucide="calendar-days" class="w-4 h-4 text-pink-400"></i>
                        <h3 class="text-sm font-black">Twój prywatny grafik</h3>
                    </div>
                    <div id="schedule-render-box" class="space-y-2 max-h-[40vh] overflow-y-auto pr-1"></div>
                    <form id="form-add-schedule" class="space-y-2 pt-3 border-t border-white/5">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                            <input id="form-title" type="text" placeholder="Gra / Temat transmisji" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-xs focus:outline-none" required>
                            <input id="form-date" type="text" placeholder="np. Sobota, 18:30" class="w-full bg-black/40 border border-white/10 rounded-xl p-3 text-xs focus:outline-none" required>
                        </div>
                        <button type="submit" class="w-full py-3 bg-gradient-to-r from-purple-600 to-pink-600 font-bold text-xs rounded-xl shadow-lg cursor-pointer">
                            Zapisz termin w chmurze
                        </button>
                    </form>
                </div>
            </div>

            <div id="tab-bot" class="tab-view hidden flex flex-col h-[74vh]">
                <div class="p-4 rounded-2xl liquid-glass flex flex-col h-full space-y-3 overflow-hidden">
                    <div class="flex items-center justify-between border-b border-white/5 pb-2 shrink-0">
                        <div class="flex items-center gap-2">
                            <i data-lucide="sparkles" class="w-4 h-4 text-purple-400"></i>
                            <span class="text-xs font-bold uppercase tracking-wider">Twój Asystent Gemini AI</span>
                        </div>
                        <button id="btn-set-gemini" class="text-[10px] bg-white/5 hover:bg-white/10 border border-white/10 px-2 py-1 rounded-lg font-bold">Ustaw klucz API</button>
                    </div>
                    <div id="chat-output" class="flex-1 overflow-y-auto space-y-2.5 pr-1 text-xs"></div>
                    <form id="form-chat" class="flex gap-2 shrink-0 pt-2 border-t border-white/5">
                        <input id="chat-input" type="text" placeholder="Zapytaj AI o pomysł na stream..." class="flex-1 bg-black/40 border border-white/10 rounded-xl p-3 text-xs focus:outline-none">
                        <button type="submit" class="p-3 bg-purple-600 rounded-xl text-xs font-bold cursor-pointer"><i data-lucide="send" class="w-4 h-4"></i></button>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithRedirect, GoogleAuthProvider, getRedirectResult, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Twoja osobista konfiguracja Firebase wstrzyknięta do systemu
        const firebaseConfig = {
            apiKey: "AIzaSyBxBTac6I3jvetfSno0HGXcVWRKJw0Px3U",
            authDomain: "streamhub-2cfd0.firebaseapp.com",
            projectId: "streamhub-2cfd0",
            storageBucket: "streamhub-2cfd0.firebasestorage.app",
            messagingSenderId: "1037809411699",
            appId: "1:1037809411699:web:289775254789a1805aac06",
            measurementId: "G-YKCM17E4C8"
        };

        // Inicjalizacja instancji systemowych
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        let currentUser = null;
        let schedulesList = [];

        // Aktywacja ekranu startowego
        document.getElementById('screen-login').classList.remove('hidden');
        lucide.createIcons();

        document.getElementById('btn-google-login').addEventListener('click', () => {
            signInWithRedirect(auth, provider);
        });

        document.getElementById('btn-logout').addEventListener('click', () => {
            signOut(auth).then(() => window.location.reload());
        });

        getRedirectResult(auth).then(res => {
            if (res?.user) setupUserEnvironment(res.user);
        }).catch(err => alert("Błąd autoryzacji Google: " + err.message));

        onAuthStateChanged(auth, user => {
            if (user) setupUserEnvironment(user);
        });

        function setupUserEnvironment(user) {
            currentUser = user;
            document.getElementById('screen-login').classList.add('hidden');
            document.getElementById('screen-dashboard').classList.remove('hidden');

            document.getElementById('ui-avatar').src = user.photoURL || '';
            document.getElementById('ui-username').innerText = user.displayName || 'Użytkownik';
            switchTab('tab-home');

            // Segregacja danych: osobny folder na podstawie unikalnego UID z konta Google
            const userDocRef = doc(db, 'users_production', user.uid);
            const userSchedCollRef = collection(db, 'users_production', user.uid, 'schedules');

            // Pobranie bieżącego tytułu
            getDoc(userDocRef).then(snap => {
                if(snap.exists()) document.getElementById('inp-stream-title').value = snap.data().streamTitle || '';
            });

            document.getElementById('btn-save-title').addEventListener('click', async () => {
                const titleVal = document.getElementById('inp-stream-title').value;
                await setDoc(userDocRef, { streamTitle: titleVal }, { merge: true });
                showToast("Tytuł pomyślnie zapisany w chmurze!");
            });

            // Live-sync harmonogramu (onSnapshot)
            onSnapshot(userSchedCollRef, (snap) => {
                schedulesList = [];
                snap.forEach(d => schedulesList.push({ id: d.id, ...d.data() }));
                renderScheduleUI();
            });

            document.getElementById('form-add-schedule').onsubmit = async (e) => {
                e.preventDefault();
                const t = document.getElementById('form-title');
                const d = document.getElementById('form-date');
                await addDoc(userSchedCollRef, { title: t.value, date: d.value });
                t.value = ''; d.value = '';
                showToast("Dodano transmisję do Twojego profilu!");
            };

            window.deleteScheduleItem = async (itemId) => {
                await deleteDoc(doc(db, 'users_production', user.uid, 'schedules', itemId));
                showToast("Usunięto pozycję.");
            };
        }

        function renderScheduleUI() {
            const container = document.getElementById('schedule-render-box');
            let html = "";
            schedulesList.forEach(item => {
                html += `
                <div class="p-3 bg-white/5 rounded-xl border border-white/5 flex justify-between items-center hover:bg-white/10 transition-all">
                    <div>
                        <p class="font-bold text-white text-xs">${item.title}</p>
                        <p class="text-[10px] text-slate-400 mt-0.5">${item.date}</p>
                    </div>
                    <button onclick="window.deleteScheduleItem('${item.id}')" class="p-2 text-red-400 hover:bg-red-500/10 rounded-lg transition-all cursor-pointer">
                        <i data-lucide="trash-2" style="width:14px; height:14px;"></i>
                    </button>
                </div>`;
            });
            container.innerHTML = html || `<p class="text-slate-500 text-center text-[11px] py-6">Twój grafik jest obecnie pusty.</p>`;
            document.getElementById('stat-count').innerText = schedulesList.length;
            lucide.createIcons();
        }

        // AKTYWACJA ASYSTENTA AI GEMINI
        document.getElementById('btn-set-gemini').addEventListener('click', () => {
            const key = prompt("Wklej swój osobisty klucz API Gemini:", localStorage.getItem('prod_gemini_key') || "");
            if(key !== null) {
                localStorage.setItem('prod_gemini_key', key.trim());
                showToast("Klucz AI został zapisany!");
            }
        });

        document.getElementById('form-chat').addEventListener('submit', async (e) => {
            e.preventDefault();
            const inp = document.getElementById('chat-input');
            const query = inp.value.trim();
            if (!query) return;

            appendMessage("Ty", query, "text-purple-400 text-right bg-purple-500/5 ml-auto");
            inp.value = '';

            const activeGeminiKey = localStorage.getItem('prod_gemini_key');
            if(!activeGeminiKey) {
                appendMessage("System", "Kliknij przycisk 'Ustaw klucz API' u góry ekranu, aby połączyć się z Gemini AI.", "text-amber-400 bg-amber-500/5");
                return;
            }

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${activeGeminiKey}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ contents: [{ parts: [{ text: query }] }] })
                });
                const data = await response.json();
                const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "Model nie zwrócił odpowiedzi.";
                appendMessage("Asystent AI", reply, "text-pink-400 bg-pink-500/5");
            } catch(err) {
                appendMessage("System", "Błąd połączenia. Sprawdź poprawność klucza API.", "text-red-400 bg-red-500/5");
            }
        });

        function appendMessage(sender, text, classes) {
            const box = document.getElementById('chat-output');
            const el = document.createElement('div');
            el.className = `p-3 rounded-xl max-w-[85%] border border-white/5 space-y-0.5 ${classes}`;
            el.innerHTML = `<span class="block text-[9px] font-black uppercase tracking-wider opacity-60">${sender}</span><span class="text-slate-200">${text}</span>`;
            box.appendChild(el);
            box.scrollTop = box.scrollHeight;
        }

        window.switchTab = function(tabId) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(b => b.className = "nav-btn flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-bold text-slate-400 hover:bg-white/5");
            document.getElementById('nav-' + tabId).className = "nav-btn flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-bold liquid-glass-active text-purple-400";
        };

        function showToast(text) {
            const el = document.getElementById('toast');
            document.getElementById('toast-text').innerText = text;
            el.className = "fixed top-4 right-4 z-50 transform translate-y-0 opacity-100 p-3 rounded-xl bg-purple-600 text-white font-bold text-xs shadow-lg flex items-center gap-2 transition-all duration-300";
            setTimeout(() => {
                el.className = "fixed top-4 right-4 z-50 transform translate-y-[-20px] opacity-0 pointer-events-none transition-all duration-300 p-3 rounded-xl bg-purple-600 text-white font-bold text-xs shadow-lg flex items-center gap-2";
            }, 3000);
        }
    </script>
</body>
</html>
